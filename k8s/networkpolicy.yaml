apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: weather-app-ingress
  namespace: weather-app
spec:
  podSelector:
    matchLabels:
      app: weather-app
  policyTypes:
    - Ingress
  ingress:
    - from:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 8080
